[Internal]
; GameState: Tracks game pause/unpause state so other hooks know when the
; player is actively in-game. Soft dependency for some gameplay hooks.
; (Toggle via [Hooks])

[Display]
; DisplayDetection: Detects display configuration — aspect ratio and
; multi-monitor setup. Caches display dimensions for reload logging.
; ViewportFitting: Adjusts viewport to fill the screen at non-16:9
; aspect ratios, removing black bars.

; Aspect ratio override. Auto(0) = detect from game resolution.
; Accepts ratio like 21:9, 32:9, or decimal like 2.333
AspectRatio=0
; Monitor mode: Auto(0), Single(1), Multi(2)
; Also accepts: Triple (alias for Multi)
MultiMonitor=Auto

[UI]
; ViewportScaling: Scales Scaleform UI elements beyond the default 16:9
; bounds to fill ultrawide/multi-monitor area.

; How much to stretch UI beyond 16:9 bounds (0.0 = no stretch, 1.0 = fill screen)
; Horizontal: for wider-than-16:9 (21:9, 32:9) — fill pillarbox area
StretchHorizontal=0.0
; Vertical: for narrower-than-16:9 (16:10, 4:3, 5:4) — fill letterbox area
StretchVertical=0.0

[FOV]
; FOVCorrection: Corrects field of view for non-16:9 aspect ratios so the
; image doesn't appear stretched or cropped.

; FOV correction mode: Auto(0), VertPlus(1), HorPlus(2)
; Auto = Hor+ when narrower than 16:9, Vert+ otherwise
Mode=Auto
; Additional FOV multiplier applied on top (1.0 = default, >1.0 = wider)
Multiplier=1.0

[FPS]
; FPSUnlock: Removes or adjusts the game's built-in frame rate cap.

; Target FPS limit. 0 = uncapped (removes frame limiter entirely).
; Any positive value = cap to that FPS (e.g. 60, 120, 144).
; Default: 0
Target=0

[Language]
; LanguageUnlock: Makes all language options available regardless of
; purchase region.

; Requires language data files (sounddata, videos) to be present.
; Code default: false
UnlockAll=true
; Override UI language (overrides registry value).
; Accepts name (English, French, Spanish, Polish, German, ChineseTrad, Hungarian,
; Italian, Japanese, Czech, Korean, Russian, Dutch, Danish, Norwegian, Swedish,
; Portuguese, Brazil, Finnish, Arabic, Mexican) or index (1-21).
; LocTest(22) is accepted but intended for development use only.
; None(0) = don't override.
; Default: None
UILanguage=None

[Hooks]
; Toggle individual hooks. Some hooks support hot-reload; others only
; take effect on next launch. Accepts: true/false, yes/no, on/off, 1/0
GameState=true
ViewportFitting=true
ViewportScaling=true
DisplayDetection=true
FOVCorrection=true
FPSUnlock=true
LanguageUnlock=true
