[Startup]
; PlatformSpecsFix: Stubs Display_EnumerateAllModes so the DxDiag COM
; initialization (IDxDiagProvider::Initialize) thread completes instantly,
; preventing a startup freeze/deadlock.
; (Toggle via [Hooks])

[Input]
; DS4v2Fix: Recognize DualShock 4 v2 controller (PID 0x09CC) so the game
; shows correct PlayStation button prompts instead of Xbox.
; (Toggle via [Hooks])

; Force controller button prompt type regardless of connected controller.
; Useful when Steam Input remapping causes wrong prompts.
; Type: Xbox, PlayStation
PromptType=PlayStation

[Display]
; ResolutionFix: Filter non-standard aspect ratio resolutions (e.g.
; 4096x2160 / 17:9) from the display mode list. Prevents black bars
; and squished image when using certain monitors.
; (Toggle via [Hooks])

[FPS]
; FPSUnlock: Removes or adjusts the game's built-in frame rate cap.
; Set to 0 for uncapped (default), or a value like 60 to cap at 60 FPS.
; Capping to 60 mitigates the London Drift perk not counting drifts at high FPS.
Target=0

[Language]
; Make all languages available regardless of purchase region.
; Requires language data files (sounddata, videos) to be present.
UnlockAll=true

[Hooks]
; Toggle individual hooks at runtime (hot-reload supported).
; Accepts: true/false, yes/no, on/off, 1/0
PlatformSpecsFix=true
DS4v2Fix=true
PromptOverride=true
ResolutionFix=true
FPSUnlock=true
LanguageUnlock=true
