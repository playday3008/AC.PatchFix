[ResolutionFix]
; Filter non-standard aspect ratio resolutions (e.g. 4096x2160 / 17:9)
; from the display mode list. Prevents black bars and squished image.
; Code default: true
Enabled=true

[DS4v2Fix]
; Recognize DualShock 4 v2 controller (PID 0x09CC) for correct
; PlayStation button prompts. Without this, DS4 v2 gets Xbox prompts.
; Code default: true
Enabled=true

[PlatformSpecsFix]
; Fix game freeze during startup caused by DxDiag COM initialization
; (IDxDiagProvider::Initialize) deadlocking on PlatformSpecsThread.
; Stubs Display_EnumerateAllModes so the thread completes instantly.
; Code default: true
Enabled=true

[PromptOverride]
; Force controller button prompt type regardless of connected controller.
; Useful when the game detects your controller incorrectly (e.g. DS4 via
; Steam Input showing Xbox prompts).
; Type: Xbox, PS3, PS4
; Code default: false
Enabled=false
Type=PS4

[Language]
; Make all languages available regardless of purchase region.
; Requires language data files (sounddata, videos) to be present.
; Code default: false
UnlockAll=true

[DriftFix]
; Fix London Drift perk not counting drifts at >60 FPS.
; NOT YET IMPLEMENTED — requires dynamic analysis to locate patch target.
; Code default: false
Enabled=false

[Hooks]
; Toggle individual hooks at runtime (hot-reload supported)
; Accepts: true/false, yes/no, on/off, 1/0
PlatformSpecsFix=true
ResolutionFix=true
DS4v2Fix=true
PromptOverride=true
DriftFix=false
LanguageUnlock=true
