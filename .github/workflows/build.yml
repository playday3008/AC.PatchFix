name: Build

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  LLVM_VERSION: '21'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-llvm
        with:
          llvm-version: ${{ env.LLVM_VERSION }}
          extra-tools: clang-format

      - name: clang-format check
        run: |
          find src include -type f \( -name '*.cpp' -o -name '*.hpp' \) \
            | xargs clang-format --dry-run --Werror

  tidy:
    name: Clang-Tidy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [format]
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-llvm
        with:
          llvm-version: ${{ env.LLVM_VERSION }}
          extra-tools: clang-tidy

      - name: Clone msvc-wine
        run: git clone https://github.com/mstorsjo/msvc-wine.git /tmp/msvc-wine

      - name: Get MSVC version
        id: msvc-version
        run: |
          MSVC_VER=$(/tmp/msvc-wine/vsdownload.py --print-version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?' | tail -1)
          echo "version=$MSVC_VER" >> "$GITHUB_OUTPUT"

      - name: Restore msvc-wine cache
        id: msvc-wine-cache
        uses: actions/cache@v5
        with:
          path: ~/.msvc
          key: msvc-wine-${{ steps.msvc-version.outputs.version }}-${{ hashFiles('cmake/toolchains/*.cmake') }}
          restore-keys: msvc-wine-

      - name: Install msvc-wine
        if: steps.msvc-wine-cache.outputs.cache-hit != 'true'
        run: |
          /tmp/msvc-wine/vsdownload.py --accept-license --dest ~/.msvc
          /tmp/msvc-wine/install.sh ~/.msvc

      - name: Configure CMake
        run: cmake --preset linux-x64-release

      - name: clang-tidy check
        run: |
          find src -type f -name '*.cpp' \
            | xargs clang-tidy -p build

  build-windows:
    name: Build (Windows)
    runs-on: windows-2025-vs2026
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Configure Release
        run: cmake --preset windows-x64-release

      - name: Build Release
        run: cmake --build --preset windows-x64-release --config Release

      - name: Configure Debug
        run: cmake --preset windows-x64-debug

      - name: Build Debug
        run: cmake --build --preset windows-x64-debug --config Debug

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: AC.Rogue.PatchFix-windows-${{ github.sha }}
          path: |
            build/Release/AC.Rogue.PatchFix.asi
            build/Debug/AC.Rogue.PatchFix.asi
            config/AC.Rogue.PatchFix.ini
          if-no-files-found: error

  build-linux:
    name: Build (Linux cross-compile)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-llvm
        with:
          llvm-version: ${{ env.LLVM_VERSION }}

      - name: Clone msvc-wine
        run: git clone https://github.com/mstorsjo/msvc-wine.git /tmp/msvc-wine

      - name: Get MSVC version
        id: msvc-version
        run: |
          MSVC_VER=$(/tmp/msvc-wine/vsdownload.py --print-version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?' | tail -1)
          echo "version=$MSVC_VER" >> "$GITHUB_OUTPUT"

      - name: Restore msvc-wine cache
        id: msvc-wine-cache
        uses: actions/cache@v5
        with:
          path: ~/.msvc
          key: msvc-wine-${{ steps.msvc-version.outputs.version }}-${{ hashFiles('cmake/toolchains/*.cmake') }}
          restore-keys: msvc-wine-

      - name: Install msvc-wine
        if: steps.msvc-wine-cache.outputs.cache-hit != 'true'
        run: |
          /tmp/msvc-wine/vsdownload.py --accept-license --dest ~/.msvc
          /tmp/msvc-wine/install.sh ~/.msvc

      - name: Build Release
        run: |
          cmake --preset linux-x64-release
          cmake --build --preset linux-x64-release

      - name: Stage Release artifact
        run: |
          mkdir -p artifacts/Release
          cp build/AC.Rogue.PatchFix.asi artifacts/Release/AC.Rogue.PatchFix.asi

      - name: Configure Debug
        run: |
          rm -rf build
          cmake --preset linux-x64-debug

      - name: Build Debug
        run: cmake --build --preset linux-x64-debug

      - name: Stage Debug artifact
        run: |
          mkdir -p artifacts/Debug
          cp build/AC.Rogue.PatchFix.asi artifacts/Debug/AC.Rogue.PatchFix.asi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: AC.Rogue.PatchFix-linux-${{ github.sha }}
          path: |
            artifacts/Release/AC.Rogue.PatchFix.asi
            artifacts/Debug/AC.Rogue.PatchFix.asi
            config/AC.Rogue.PatchFix.ini
          if-no-files-found: error
